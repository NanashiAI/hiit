<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>HIIT PRO CUSTOM</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --work-color: #ff4757;
            --rest-color: #2ed573;
            --text-color: #ffffff;
            --progress-bg: #333;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            transition: background-color 0.5s ease;
        }
        #progressBarContainer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 8px;
            background-color: var(--progress-bg);
            z-index: 100;
        }
        #progressBar {
            width: 0%;
            height: 100%;
            background-color: var(--text-color);
            transition: width 0.3s linear;
        }
        .status { font-size: 2rem; font-weight: bold; margin-bottom: 10px; text-transform: uppercase; z-index: 10; }
        .timer { font-size: 8rem; font-weight: 900; line-height: 1; margin-bottom: 20px; z-index: 10; }
        .info { font-size: 1.5rem; margin-bottom: 30px; color: #ccc; z-index: 10; }
        .controls { display: flex; flex-direction: column; align-items: center; gap: 15px; z-index: 10; }
        .btn-group { display: flex; gap: 15px; }
        button {
            padding: 15px 35px;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s;
        }
        button:active { transform: scale(0.95); }
        #startBtn { background-color: var(--text-color); color: var(--bg-color); }
        #resetBtn { background-color: #555; color: white; }
        
        .option-group { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-top: 10px; max-width: 90%; }
        .toggle-btn {
            background-color: transparent;
            color: #777;
            border: 2px solid #444;
            padding: 8px 15px;
            font-size: 0.8rem;
        }
        .toggle-btn.active {
            border-color: var(--text-color);
            color: var(--text-color);
            background-color: rgba(255,255,255,0.1);
        }
        .work-mode { background-color: var(--work-color); }
        .rest-mode { background-color: var(--rest-color); }
        /* バイブレーション非対応環境用メッセージ */
        #vibeSupportMsg {
            font-size: 0.7rem;
            color: #ff6b6b;
            margin-top: 5px;
            display: none;
        }

        /* ── 広告エリア ── */
        .ad-area {
            width: 100%;
            max-width: 480px;
            text-align: center;
            margin-bottom: 16px;
        }

        /* ── OFUSEエリア ── */
        .support-area {
            width: 100%;
            max-width: 480px;
            text-align: center;
            padding: 16px;
            margin-bottom: 24px;
            border-top: 1px solid rgba(255,255,255,0.15);
        }
        .support-area p {
            font-size: 13px;
            color: rgba(255,255,255,0.5);
            margin: 0 0 10px;
        }
        .ofuse-btn {
            display: inline-block;
            background: #7B61FF;
            color: #fff;
            font-weight: 700;
            font-size: 14px;
            padding: 10px 24px;
            border-radius: 24px;
            text-decoration: none;
            transition: opacity 0.2s;
        }
        .ofuse-btn:hover { opacity: 0.85; }
    </style>
</head>
<body>

    <div id="progressBarContainer">
        <div id="progressBar"></div>
    </div>

    <div id="status" class="status">READY</div>
    <div id="timer" class="timer">20</div>
    <div id="info" class="info">SET: 1 / 8</div>

    <div class="controls">
        <div class="btn-group">
            <button id="startBtn" onclick="toggleTimer()">START</button>
            <button id="resetBtn" onclick="resetTimer()">RESET</button>
        </div>
        <div class="option-group">
            <button id="audioBtn" class="toggle-btn" onclick="toggleAudio()">SOUND: OFF</button>
            <button id="vibeBtn" class="toggle-btn" onclick="toggleVibe()">VIBE: OFF</button>
            <button id="skipLastRestBtn" class="toggle-btn" onclick="toggleSkipLastRest()">LAST REST: ON</button>
        </div>
        <div id="vibeSupportMsg">※Vibration API is not supported in this browser.</div>
    </div>

    <!-- 広告エリア -->
    <div class="ad-area">
        <!-- admax -->
        <script src="https://adm.shinobi.jp/s/479f1c6ac4146536aadc2779b0130bc2"></script>
        <!-- admax -->
    </div>

    <!-- OFUSEエリア -->
    <div class="support-area">
        <p style="font-size: 14px; margin-top: 20px;">
            このツールが便利だったら☕<a href="https://ofuse.me/4af7da02">コーヒー1杯分の支援</a>お願いします
        </p>
    </div>

    <script>
        let countdown;
        let isRunning = false;
        let currentSet = 1;
        let isWork = true;
        let timeLeft = 20;
        let wakeLock = null;
        let isAudioEnabled = false;
        let isVibeEnabled = false;
        let skipLastRest = false;

        const statusEl = document.getElementById('status');
        const timerEl = document.getElementById('timer');
        const infoEl = document.getElementById('info');
        const startBtn = document.getElementById('startBtn');
        const audioBtn = document.getElementById('audioBtn');
        const vibeBtn = document.getElementById('vibeBtn');
        const skipBtn = document.getElementById('skipLastRestBtn');
        const progressBar = document.getElementById('progressBar');
        const bodyEl = document.body;
        const vibeMsgEl = document.getElementById('vibeSupportMsg');

        // バイブレーション対応確認
        const isVibeSupported = 'vibrate' in navigator;
        if (!isVibeSupported) {
            vibeBtn.style.display = 'none'; // ボタンを隠す
            vibeMsgEl.style.display = 'block'; // メッセージを表示
        }

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playBeep(frequency, duration) {
            if (!isAudioEnabled) return;
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.type = 'square';
            oscillator.frequency.value = frequency;
            gainNode.gain.setTargetAtTime(0.1, audioCtx.currentTime, 0.02);
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + duration);
        }

        function doVibrate(pattern) {
            if (!isVibeEnabled || !isVibeSupported) return;
            navigator.vibrate(pattern);
        }

        function toggleAudio() {
            isAudioEnabled = !isAudioEnabled;
            audioBtn.textContent = isAudioEnabled ? 'SOUND: ON' : 'SOUND: OFF';
            audioBtn.classList.toggle('active', isAudioEnabled);
            if (isAudioEnabled && audioCtx.state === 'suspended') audioCtx.resume();
        }

        function toggleVibe() {
            if (!isVibeSupported) return;
            isVibeEnabled = !isVibeEnabled;
            vibeBtn.textContent = isVibeEnabled ? 'VIBE: ON' : 'VIBE: OFF';
            vibeBtn.classList.toggle('active', isVibeEnabled);
            if (isVibeEnabled) {
                // テスト振動
                doVibrate(200);
            }
        }

        function toggleSkipLastRest() {
            skipLastRest = !skipLastRest;
            skipBtn.textContent = skipLastRest ? 'LAST REST: SKIP' : 'LAST REST: ON';
            skipBtn.classList.toggle('active', skipLastRest);
        }

        async function requestWakeLock() {
            try { if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen'); } 
            catch (err) {}
        }

        function releaseWakeLock() {
            if (wakeLock !== null) { wakeLock.release(); wakeLock = null; }
        }

        function updateDisplay() {
            timerEl.textContent = timeLeft;
            infoEl.textContent = `SET: ${currentSet} / 8`;
            
            // 全体時間を計算（最後の休憩を飛ばすかどうかで分母を変える）
            const totalDuration = skipLastRest ? 230 : 240;
            const totalElapsed = ((currentSet - 1) * 30) + (isWork ? (20 - timeLeft) : (20 + (10 - timeLeft)));
            const progressPercent = Math.min((totalElapsed / totalDuration) * 100, 100);
            progressBar.style.width = `${progressPercent}%`;

            if (!isRunning && statusEl.textContent === 'READY') return;

            if (isWork) {
                statusEl.textContent = "WORK";
                bodyEl.className = 'work-mode';
            } else {
                statusEl.textContent = "REST";
                bodyEl.className = 'rest-mode';
            }
        }

        // ── START / PAUSE / RESUME ──
        async function toggleTimer() {
            if (isRunning) {
                clearInterval(countdown);
                releaseWakeLock();
                startBtn.textContent = 'RESUME';
                isRunning = false;
            } else {
                await requestWakeLock();
                isRunning = true;
                startBtn.textContent = 'PAUSE';
                countdown = setInterval(() => {
                    timeLeft--;
                    if (timeLeft < 0) switchPhase();
                    updateDisplay();
                }, 1000);
            }
        }

        // ── フェーズ切り替え ──
        function switchPhase() {
            if (isWork) {
                // 最終セットのワーク終了判定
                if (currentSet === 8 && skipLastRest) {
                    finish();
                    return;
                }
                isWork = false;
                timeLeft = 10;
                playBeep(440, 0.5);
                // レスト開始: 短く1回
                doVibrate(300); 
            } else {
                if (currentSet === 8) {
                    finish();
                    return;
                }
                isWork = true;
                timeLeft = 20;
                currentSet++;
                playBeep(880, 0.5);
                // ワーク開始: 短く2回
                doVibrate([200, 100, 200]); 
            }
        }

        function finish() {
            clearInterval(countdown);
            releaseWakeLock();
            progressBar.style.width = '100%';
            playBeep(1320, 1.0);
            // 終了: 長めに
            doVibrate([500, 200, 500]); 
            setTimeout(() => { alert("COMPLETE!"); resetTimer(); }, 100);
        }

        function resetTimer() {
            clearInterval(countdown);
            releaseWakeLock();
            isRunning = false;
            currentSet = 1;
            isWork = true;
            timeLeft = 20;
            statusEl.textContent = 'READY';
            startBtn.textContent = 'START';
            bodyEl.className = '';
            progressBar.style.width = '0%';
            updateDisplay();
        }

        updateDisplay();
    </script>
</body>
</html>
